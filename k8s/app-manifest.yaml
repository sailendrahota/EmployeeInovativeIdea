apiVersion: v1
kind: Service
metadata:
  name: spring-boot-service
  labels:
    app: spring-boot
spec:
  type: NodePort
  selector:
    app: spring-boot
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spring-boot
  template:
    metadata:
      labels:
        app: spring-boot
    spec:
      # --- NEW SCOUT CONTAINER ---
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.28
          command:
            - 'sh'
            - '-c'
            - 'until nc -z mysql-service 3306; do echo "Waiting for MySQL..."; sleep 3; done; echo "MySQL is up!"'
      # ---------------------------
      containers:
        - name: spring-boot-app
          image: sailenhota/zele-backend:a9c9841
            # Inside app-manifest.yaml -> spec.template.spec.containers.env
          env:
              # --- Non-Sensitive Routing (From ConfigMap) ---
             - name: DATABASE_HOST
               valueFrom:
                  configMapKeyRef:
                    name: spring-boot-config
                    key: DATABASE_HOST
             - name: DATABASE_NAME
               valueFrom:
                  configMapKeyRef:
                    name: spring-boot-config
                    key: DATABASE_NAME
             - name: APP_ENV
               valueFrom:
                  configMapKeyRef:
                    name: spring-boot-config
                    key: APP_ENV

                # --- Sensitive Credentials (From Secret) ---
             - name: DATABASE_USER
               valueFrom:
                  secretKeyRef:
                    name: mysql-credentials
                    key: MYSQL_USER
             - name: DATABASE_PASSWORD
               valueFrom:
                    secretKeyRef:
                      name: mysql-credentials
                      key: MYSQL_PASSWORD
            # --- JVM MEMORY TUNING ---
             - name: JAVA_TOOL_OPTIONS
               value: "-XX:MinRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0"
                # -------------------------
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"      # Baseline: 10% of a CPU core
            limits:
              memory: "1024Mi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: api/actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spring-boot-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spring-boot-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before panicking
      policies:
        - type: Pods
          value: 1                       # Only add 1 pod at a time
          periodSeconds: 60              # Wait 60 seconds between adding pods
        # --- ADD THIS SCALE DOWN SPEC ---
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes after CPU drops to ensure the spike is truly over
      policies:
        - type: Pods
          value: 1                     # Only remove 1 pod at a time safely
          periodSeconds: 60            # Wait 60 seconds before removing another