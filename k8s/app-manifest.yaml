apiVersion: v1
kind: Service
metadata:
  name: spring-boot-service
  labels:
    app: spring-boot
spec:
  type: NodePort
  selector:
    app: spring-boot
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spring-boot
  template:
    metadata:
      labels:
        app: spring-boot
    spec:
      # --- NEW SCOUT CONTAINER ---
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.28
          command:
            - 'sh'
            - '-c'
            - 'until nc -z mysql-service 3306; do echo "Waiting for MySQL..."; sleep 3; done; echo "MySQL is up!"'
      # ---------------------------
      containers:
        - name: spring-boot-app
          image: sailenhota/zele-backend:c7c1fb0
          env:
            - name: DATABASE_HOST                          # Add this block
              value: "mysql-service"                       # Points to K8s MySQL
            - name: APP_ENV                       # ADD THIS NEW BLOCK
              value: "Minikube-Local Cluster"
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"      # Baseline: 10% of a CPU core
            limits:
              memory: "1024Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spring-boot-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spring-boot-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before panicking
      policies:
        - type: Pods
          value: 1                       # Only add 1 pod at a time
          periodSeconds: 60              # Wait 60 seconds between adding pods