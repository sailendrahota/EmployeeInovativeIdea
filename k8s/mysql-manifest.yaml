---
# 1. The Storage (Persistent Volume Claim)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pv-claim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# 2. The MySQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
spec:
  replicas: 1 # Databases usually run as a single instance in basic setups
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        # --- CONTAINER 1: THE ACTUAL DATABASE ---
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: "zelledb"
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: MYSQL_PASSWORD
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql

        # --- CONTAINER 2: THE PROMETHEUS EXPORTER SIDECAR ---
        - name: mysql-exporter
          image: prom/mysqld-exporter:v0.14.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: MYSQL_ROOT_PASSWORD
            - name: DATA_SOURCE_NAME
              value: "root:$(MYSQL_ROOT_PASSWORD)@tcp(localhost:3306)/"
          ports:
            - containerPort: 9104
              name: metrics

      volumes:
        - name: mysql-persistent-storage
          persistentVolumeClaim:
            claimName: mysql-pv-claim

---
# 3. The Internal Service (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  labels:          # <--- ADD THIS
    app: mysql
  # THESE ANNOTATIONS ARE THE NEON SIGN FOR PROMETHEUS
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9104"
spec:
  ports:
    # We must name the ports now that there is more than one
    - name: mysql
      port: 3306
      targetPort: 3306
    - name: metrics
      port: 9104
      targetPort: 9104
  selector:
    app: mysql