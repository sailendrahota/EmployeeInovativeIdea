## Spring DATASOURCE (DataSourceAutoConfiguration & DataSourceProperties)
## Hibernate Properties
# The SQL dialect makes Hibernate generate better SQL for the chosen database
#spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL5InnoDBDialect

server.port=8080


#commment  datasource config not for  production only for local dev
#spring.datasource.url =jdbc:h2:mem:testdb
#spring.datasource.username =sa
#spring.datasource.password =password
#spring.datasource.driver-class-name=org.h2.Driver
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.h2.console.enabled=true

# Tell Hibernate to automatically create your tables  Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# K8s Internal DNS routing to your new MySQL service prod
spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:3306/${DATABASE_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# (Note: Keep passwords in a Kubernetes Secret, not a ConfigMap, for production n stage+ env!)

app.environment=${APP_ENV:Local-Development}


management.endpoints.web.exposure.include=health,prometheus,info,metrics
management.endpoint.health.probes.enabled=true

spring.cloud.compatibility-verifier.enabled=false
#spring.mvc.pathmatch.matching-strategy=ant_path_matcher

#Authentication Secret Key
jwt.secret=fiserve*123@1


server.servlet.context-path=/api

