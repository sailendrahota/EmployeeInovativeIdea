# 1. Main Application (default namespace - YOUR EXISTING SETUP)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hr-portal-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
    - host: hr-portal.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: spring-boot-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zelefrontend-service
                port:
                  number: 80

---
# 2. Monitoring Stack (monitoring namespace)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: monitoring
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.hr-portal.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-grafana
                port:
                  number: 80
    - host: prometheus.hr-portal.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-kube-prometheus-prometheus
                port:
                  number: 9090

---
# 3. ArgoCD Stack (argocd namespace)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    # ArgoCD forces HTTPS internally. This tells NGINX how to talk to it.
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.hr-portal.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 443