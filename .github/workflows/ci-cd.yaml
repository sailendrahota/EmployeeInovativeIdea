name: Full Stack Enterprise CI/CD

on:
  push:
    branches:
      - main

jobs:
  # JOB 1: The Quality Scan (Runs independently in the background)
  qodana-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Qodana Scan
        uses: JetBrains/qodana-action@v2026.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          use-caches: true
          post-pr-comment: true
          use-annotations: true
          upload-result: false
          push-fixes: 'none'

  # JOB 2: Build, Push, and Trigger GitOps Delivery
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Smart Path Filtering
      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'zelebackend/**'
            frontend:
              - 'zele-frontend/**'

      # Only setup Docker & login if application code actually changed
      - name: Set up Docker Buildx
        if: steps.filter.outputs.backend == 'true' || steps.filter.outputs.frontend == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Set Short Git SHA
        if: steps.filter.outputs.backend == 'true' || steps.filter.outputs.frontend == 'true'
        id: vars
        run: |
          echo "SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        if: steps.filter.outputs.backend == 'true' || steps.filter.outputs.frontend == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Backend Build - ONLY runs if backend files changed
      - name: Build and Push Backend
        if: steps.filter.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./zelebackend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/zele-backend:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend Build - ONLY runs if frontend files changed
      - name: Build and Push Frontend
        if: steps.filter.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./zele-frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/zelefrontend:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Targeted Manifest Updates
      - name: Update Kubernetes Manifests with New Image Tags
        if: steps.filter.outputs.backend == 'true' || steps.filter.outputs.frontend == 'true'
        run: |
          echo "Deploying version: ${{ env.SHORT_SHA }}"
          
          if [ "${{ steps.filter.outputs.backend }}" == "true" ]; then
            sed -i "s|image: .*\/zele-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/zele-backend:${{ env.SHORT_SHA }}|g" k8s/app-manifest.yaml
          fi
          
          if [ "${{ steps.filter.outputs.frontend }}" == "true" ]; then
            sed -i "s|image: .*\/zelefrontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/zelefrontend:${{ env.SHORT_SHA }}|g" k8s/ui-manifest.yaml
          fi

      # 3. Resilient Git Writeback
      - name: Commit and Push Manifest Changes back to GitHub
        if: steps.filter.outputs.backend == 'true' || steps.filter.outputs.frontend == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add k8s/app-manifest.yaml k8s/ui-manifest.yaml
          
          # Failsafe: Only commit if there are actually uncommitted changes
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "chore(ops): auto-update application image tags to ${{ env.SHORT_SHA }} [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No manifest changes detected. Skipping commit."
          fi