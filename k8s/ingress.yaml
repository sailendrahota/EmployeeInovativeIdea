apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hr-portal-ingress
spec:
  rules:
    - host: hr-portal.local
      http:
        paths:
          # Route 1: ALL backend API traffic
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: spring-boot-service
                port:
                  number: 80

          # Route 2: ALL frontend UI and asset traffic
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zelefrontend-service
                port:
                  number: 80